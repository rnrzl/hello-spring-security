<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand {
            font-weight: 800;
            color: #e94560 !important;
            font-size: 1.4rem;
        }
        .form-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,.08);
        }
        .page-header {
            border-left: 4px solid #e94560;
            padding-left: 1rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
    </div>
</nav>

<div class="container">

    <div class="page-header mb-4">
        <h4 class="fw-bold mb-0">비밀번호 변경</h4>
        <small class="text-muted">새 비밀번호로 변경합니다.</small>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card form-card">
                <div class="card-body p-5">

                    <form th:action="@{/user/password}"
                          th:object="${passwordChangeDto}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label">현재 비밀번호</label>
                            <input type="password"
                                   th:field="*{currentPassword}"
                                   class="form-control">

                            <div class="text-danger small"
                                 th:errors="*{currentPassword}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">새 비밀번호</label>
                            <input type="password"
                                   th:field="*{newPassword}"
                                   class="form-control">

                            <div class="text-danger small"
                                 th:errors="*{newPassword}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">새 비밀번호 확인</label>
                            <input type="password"
                                   th:field="*{confirmPassword}"
                                   class="form-control">

                            <div class="text-danger small"
                                 th:errors="*{confirmPassword}">
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit"
                                    class="btn btn-primary flex-grow-1">
                                비밀번호 변경
                            </button>

                            <a th:href="@{/home}"
                               class="btn btn-outline-secondary">
                                취소
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<footer class="text-center mt-5 mb-3 text-muted">
    <small
            th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2171505 | 성명: 한국희'}">
    </small>
</footer>

</body>
</html>
